<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhan Nguyen | Nhiếp Ảnh Gia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fff;
            line-height: 1.6;
        }

        /* ===== HEADER ===== */
        header {
            text-align: center;
            padding: 80px 20px 50px;
            background: linear-gradient(180deg, #141414 0%, #0a0a0a 100%);
        }

        header h1 {
            font-size: 3.2rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        header p {
            color: #888;
            font-size: 1.15rem;
            letter-spacing: 3px;
        }

        /* ===== GALLERY ===== */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            padding: 40px 24px 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .photo-card {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            background: #1a1a1a;
            aspect-ratio: 4/3;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }

        .photo-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .photo-card:hover img {
            transform: scale(1.08);
        }

        /* Bản quyền + ngày đăng ngay trên ảnh */
        .copyright {
            position: absolute;
            bottom: 14px;
            right: 14px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-size: 0.78rem;
            padding: 6px 12px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            white-space: nowrap;
        }

        .copyright span {
            color: #ccc;
            margin: 0 4px;
        }

        /* ===== LIGHTBOX ===== */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .lightbox-copyright {
            margin-top: 16px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        /* Nút đóng */
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.2s;
            z-index: 10000;
        }

        .lightbox-close:hover {
            color: #ff4444;
        }

        /* Nút prev / next */
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 2.2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-nav:hover {
            background: rgba(255,255,255,0.25);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 40px 20px;
            background: #111;
            color: #666;
            font-size: 0.95rem;
            border-top: 1px solid #222;
        }

        footer a {
            color: #aaa;
            text-decoration: none;
        }

        footer a:hover {
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header h1 {
                font-size: 2.2rem;
                letter-spacing: 4px;
            }
            .gallery {
                grid-template-columns: 1fr;
                padding: 30px 16px 60px;
            }
            .lightbox-nav {
                width: 40px;
                height: 40px;
                font-size: 1.8rem;
            }
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
            .lightbox-close {
                top: 15px;
                right: 20px;
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>Nhan Nguyen</h1>
        <p>Nhiếp Ảnh Gia</p>
    </header>

    <!-- GALLERY -->
    <div class="gallery" id="gallery">

        <!-- Ảnh 1 -->
        <div class="photo-card" data-index="0">
            <img src="https://raw.githubusercontent.com/your-username/your-repo/main/images/photo1.jpg" 
                 alt="Ảnh của Nhan Nguyen"
                 onerror="this.src='https://picsum.photos/id/1015/800/600'">
            <div class="copyright">© Nhan Nguyen <span>|</span> 17/01/2020</div>
        </div>

        <!-- Ảnh 2 -->
        <div class="photo-card" data-index="1">
            <img src="https://raw.githubusercontent.com/your-username/your-repo/main/images/photo2.jpg" 
                 alt="Ảnh của Nhan Nguyen"
                 onerror="this.src='https://picsum.photos/id/1016/800/600'">
            <div class="copyright">© Nhan Nguyen <span>|</span> 17/01/2020</div>
        </div>

        <!-- Ảnh 3 -->
        <div class="photo-card" data-index="2">
            <img src="https://raw.githubusercontent.com/your-username/your-repo/main/images/photo3.jpg" 
                 alt="Ảnh của Nhan Nguyen"
                 onerror="this.src='https://picsum.photos/id/1018/800/600'">
            <div class="copyright">© Nhan Nguyen <span>|</span> 17/01/2020</div>
        </div>

        <!-- Ảnh 4 -->
        <div class="photo-card" data-index="3">
            <img src="https://raw.githubusercontent.com/your-username/your-repo/main/images/photo4.jpg" 
                 alt="Ảnh của Nhan Nguyen"
                 onerror="this.src='https://picsum.photos/id/1025/800/600'">
            <div class="copyright">© Nhan Nguyen <span>|</span> 17/01/2020</div>
        </div>

        <!-- Ảnh 5 -->
        <div class="photo-card" data-index="4">
            <img src="https://raw.githubusercontent.com/your-username/your-repo/main/images/photo5.jpg" 
                 alt="Ảnh của Nhan Nguyen"
                 onerror="this.src='https://picsum.photos/id/1035/800/600'">
            <div class="copyright">© Nhan Nguyen <span>|</span> 17/01/2020</div>
        </div>

        <!-- Ảnh 6 -->
        <div class="photo-card" data-index="5">
            <img src="https://raw.githubusercontent.com/your-username/your-repo/main/images/photo6.jpg" 
                 alt="Ảnh của Nhan Nguyen"
                 onerror="this.src='https://picsum.photos/id/1043/800/600'">
            <div class="copyright">© Nhan Nguyen <span>|</span> 17/01/2020</div>
        </div>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2020 Nhan Nguyen — All Rights Reserved</p>
        <p style="margin-top: 8px; font-size: 0.85rem;">
            Hosted on <a href="https://github.com" target="_blank">GitHub Pages</a>
        </p>
    </footer>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev">‹</button>
        <button class="lightbox-nav lightbox-next" id="lightbox-next">›</button>
        
        <div class="lightbox-content">
            <img src="" alt="" class="lightbox-img" id="lightbox-img">
            <div class="lightbox-copyright">© Nhan Nguyen | 17/01/2020</div>
        </div>
    </div>

    <script>
        // Lấy tất cả ảnh trong gallery
        const cards = document.querySelectorAll('.photo-card');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('lightbox-close');
        const prevBtn = document.getElementById('lightbox-prev');
        const nextBtn = document.getElementById('lightbox-next');

        let currentIndex = 0;
        const images = Array.from(cards).map(card => card.querySelector('img').src);

        // Mở lightbox
        cards.forEach((card, index) => {
            card.addEventListener('click', () => {
                currentIndex = index;
                openLightbox();
            });
        });

        function openLightbox() {
            lightboxImg.src = images[currentIndex];
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // khóa scroll
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = ''; // mở lại scroll
        }

        // Đóng lightbox
        closeBtn.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // Prev / Next
        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            lightboxImg.src = images[currentIndex];
        });

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = (currentIndex + 1) % images.length;
            lightboxImg.src = images[currentIndex];
        });

        // Phím tắt
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevBtn.click();
            if (e.key === 'ArrowRight') nextBtn.click();
        });
    </script>

</body>
</html>
